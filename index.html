<!DOCTYPE html>
<html>
<head>
  <title>Certificate Sender</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.sub {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input[type="email"], input[type="file"] {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #334155;
      color: white;
    }

    input::file-selector-button {
      background: #475569;
      border: none;
      padding: 6px 10px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .add-btn {
      background: #3b82f6;
      color: white;
    }

    .send-btn {
      background: #22c55e;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 18px;
      text-align: center;
      font-weight: 500;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎓 Certificate Sender</h1>
  <p class="sub">Upload certificates and send them instantly</p>

  <div id="rows"></div>

  <div class="buttons">
    <button class="add-btn" onclick="addRow()">+ Add Row</button>
    <button class="send-btn" onclick="sendAll()">Send All</button>
  </div>

  <p id="status"></p>
</div>

<script>
function addRow() {
  const div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <input type="email" placeholder="Email address" class="email" required>
    <input type="file" class="file" required>
  `;

  document.getElementById("rows").appendChild(div);
}

// default one row
addRow();

async function sendAll() {
  const emails = document.querySelectorAll(".email");
  const files = document.querySelectorAll(".file");

  const formData = new FormData();

  for (let i = 0; i < emails.length; i++) {
    if (!emails[i].value || !files[i].files[0]) {
      alert("Please fill all fields");
      return;
    }

    formData.append("emails", emails[i].value);
    formData.append("files", files[i].files[0]);
  }

  document.getElementById("status").innerText = "Sending... ⏳";

  try {
    const res = await fetch("https://cert-sender.onrender.com/send-bulk", {
      method: "POST",
      body: formData
    });

    const text = await res.text();

    if (res.ok) {
      document.getElementById("status").innerText = "✅ All emails sent successfully";
    } else {
      document.getElementById("status").innerText = "❌ Failed to send emails";
    }

  } catch (err) {
    document.getElementById("status").innerText = "⚠️ Server not reachable";
  }
}
</script>

</body>
</html>
