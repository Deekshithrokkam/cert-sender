<!DOCTYPE html>
<html>
<head>
  <title>Certificate Sender</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1b2d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1f2e45;
      padding: 30px;
      border-radius: 12px;
      width: 600px;
      color: white;
    }

    h1 {
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input[type="text"], input[type="file"] {
      padding: 10px;
      border-radius: 6px;
      border: none;
      width: 100%;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-btn {
      background: #3b82f6;
      color: white;
    }

    .send-btn {
      background: #22c55e;
      color: white;
      float: right;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-bottom: 15px;
      border-radius: 6px;
      padding: 10px;
      border: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎓 Certificate Sender</h1>

    <!-- BULK PASTE AREA -->
    <textarea id="bulkEmails" placeholder="Paste emails here (comma, space, or newline separated)"></textarea>

    <button class="add-btn" onclick="processBulk()">Paste & Split</button>

    <div id="emailContainer"></div>

    <button class="send-btn">Send All</button>
  </div>

  <script>
    const container = document.getElementById("emailContainer");

    function createRow(email = "") {
      const row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <input type="text" placeholder="Email address" value="${email}">
        <input type="file">
      `;

      container.appendChild(row);
    }

    function processBulk() {
      const bulkText = document.getElementById("bulkEmails").value;

      // Split by comma, space, or newline
      const emails = bulkText.split(/[\s,]+/).filter(e => e.trim() !== "");

      container.innerHTML = ""; // clear previous rows

      emails.forEach(email => {
        createRow(email.trim());
      });
    }
  </script>
</body>
</html>
